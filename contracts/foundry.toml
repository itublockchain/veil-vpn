[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.17"
deny_warnings = false

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/",
  "@oasisprotocol/sapphire-contracts/=lib/sapphire-paratime/contracts/"
]

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
sapphire_testnet = "${SAPPHIRE_TESTNET_RPC_URL}"
sapphire_mainnet = "${SAPPHIRE_MAINNET_RPC_URL}"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
